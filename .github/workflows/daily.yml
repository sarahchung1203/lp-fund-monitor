name: Daily LP notice scrape

# 매일 자동 실행 (GitHub 서버에서 — 내 PC 꺼져 있어도 동작)
on:
  schedule:
    - cron: "30 23 * * *"   # 23:30 UTC = 08:30 KST (한국시간 매일 오전 8:30)
  workflow_dispatch: {}      # 수동 실행 버튼

permissions:
  contents: write            # 갱신된 index.html 등을 저장소에 push 하기 위함

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape and build dashboard
        run: python build.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "auto-update (CI)"
            git push
          fi
